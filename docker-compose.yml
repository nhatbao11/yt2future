# API + Postgres (local / staging). FE: chạy trên máy host `cd yt2future-f2-v2 && npm run dev`
# với NEXT_PUBLIC_BE_URL=http://localhost:5000 — tránh lỗi SSR trong container gọi sai host.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yt2future
      POSTGRES_PASSWORD: yt2future
      POSTGRES_DB: yt2future
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yt2future -d yt2future']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./yt2future-be-v2
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: '5000'
      DATABASE_URL: postgresql://yt2future:yt2future@postgres:5432/yt2future
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
